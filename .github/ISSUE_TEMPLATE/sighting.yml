name: 🐍 Submit a Sighting
description: Spotted an IKEA plush in a movie, show, or video? Tell us about it!
title: '[Sighting]: '
labels: ['sighting']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for spotting a plush in the wild! Fill out what you can — the more detail the better.
        **A screenshot is the most valuable thing you can include.**
        Missing details? Pick **unverified** under confidence — we can still track the sighting.
  - type: input
    id: title
    attributes:
      label: Title
      description: Name of the movie / show / video.
      placeholder: e.g. Shrek
    validations:
      required: true
  - type: input
    id: year
    attributes:
      label: Year
      description: Required unless confidence is unverified.
      placeholder: e.g. 2001
  - type: dropdown
    id: mediaType
    attributes:
      label: Type
      options:
        - movie
        - tv
        - short
        - game
        - other
    validations:
      required: true
  - type: input
    id: season
    attributes:
      label: Season (TV only)
      description: Required for TV unless confidence is unverified.
      placeholder: e.g. 2
  - type: input
    id: episode
    attributes:
      label: Episode (TV only)
      description: Required for TV unless confidence is unverified.
      placeholder: e.g. 1
  - type: input
    id: episodeTitle
    attributes:
      label: Episode title (TV, optional)
      description: Episode name if you know it (e.g. "The Odd Couples").
      placeholder: e.g. The Odd Couples
  - type: dropdown
    id: plush
    attributes:
      label: Which plush?
      description: If it's not listed, pick "other / not listed" and describe it below.
      options:
        - Djungelorm (the green snake)
        - Blåhaj (the blue shark)
        - other / not listed
    validations:
      required: true
  - type: input
    id: timestamp
    attributes:
      label: Timestamp
      description: Roughly where in the runtime does it appear?
      placeholder: e.g. 1:04:32
  - type: textarea
    id: sceneDescription
    attributes:
      label: Scene description
      description: Required unless confidence is unverified.
      placeholder: In the background of the living room scene, sitting on the couch...
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag and drop an image here, or paste a link. This is the best part!
  - type: input
    id: clipUrl
    attributes:
      label: Clip link (optional)
      placeholder: YouTube link to the moment, if one exists
  - type: dropdown
    id: confidence
    attributes:
      label: How sure are you?
      options:
        - 'unverified — missing details, still gathering info'
        - 'likely — pretty confident'
        - 'verified — no doubt, it is definitely the plush'
        - 'disputed — could be something similar'
    validations:
      required: true
  - type: dropdown
    id: creditPlatform
    attributes:
      label: Credit — social platform
      description: Where should we link your profile? Pick "none" for name only (no link).
      options:
        - github
        - instagram
        - tiktok
        - bluesky
        - youtube
        - twitch
        - reddit
        - pinterest
        - threads
        - none
  - type: input
    id: creditUsername
    attributes:
      label: Credit — username
      description: Your handle on that platform (without the @). For "none", enter the name you'd like shown.
      placeholder: your-username
